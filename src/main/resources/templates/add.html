<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Додати запис</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
</head>
<body class="container mt-4">
<h1>Додати новий запис</h1>
<form th:action="@{/add}" th:object="${reading}"
      method="post" class="col-md-6">
    <div class="mb-3">
        <label class="form-label">Споживач</label>
        <input type="text" class="form-control"
               th:field="*{consumer}"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Постачальник</label>
        <input type="text" class="form-control"
               th:field="*{supplier}"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Технік</label>
        <input type="text" class="form-control"
               th:field="*{technician}"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Дата зняття показника</label>
        <input type="text" class="form-control"
               th:field="*{reading_date}"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Показник (кВт·год)</label>
        <input type="text" class="form-control"
               th:field="*{reading_value}"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Адреса</label>
        <input type="text" class="form-control"
               th:field="*{address}"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Тарифна зона</label>
        <input type="text" class="form-control"
               th:field="*{tariff_zone}"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Ціна за кВт·год</label>
        <input type="text" class="form-control"
               th:field="*{price_per_kwh}"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Досвід техніка (роки)</label>
        <input type="text" class="form-control"
               th:field="*{experience_years}"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Тип лічильника</label>
        <input type="text" class="form-control"
               th:field="*{meter_type}"/>
    </div>
    <button type="submit" class="btn btn-success">
        Додати
    </button>
    <a th:href="@{/}" class="btn btn-secondary ms-2">
        Повернутись до списку
    </a>
</form>
</body>
</html>
