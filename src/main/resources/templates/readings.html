<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Показники електролічильників</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
</head>
<body class="container mt-4">
<h1>Показники електролічильників</h1>
<a th:href="@{/add}" class="btn btn-success mb-3">Додати запис</a>
<table class="table table-striped table-bordered">
    <thead class="table-primary">
    <tr>
        <th>Споживач</th>
        <th>Постачальник</th>
        <th>Технік</th>
        <th>Дата зняття</th>
        <th>Показник (кВт·год)</th>
        <th>Адреса</th>
        <th>Тарифна зона</th>
        <th>Ціна за кВт·год</th>
        <th>Досвід (роки)</th>
        <th>Тип лічильника</th>
        <th>Дія</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="reading : ${readings}">
        <td th:text="${reading.consumer}"></td>
        <td th:text="${reading.supplier}"></td>
        <td th:text="${reading.technician}"></td>
        <td th:text="${reading.reading_date}"></td>
        <td th:text="${reading.reading_value}"></td>
        <td th:text="${reading.address}"></td>
        <td th:text="${reading.tariff_zone}"></td>
        <td th:text="${reading.price_per_kwh}"></td>
        <td th:text="${reading.experience_years}"></td>
        <td th:text="${reading.meter_type}"></td>
        <td>
            <div class="d-flex gap-1">
                <a th:href="@{/edit/{id}(id=${reading.id})}"
                   class="btn btn-warning btn-sm">Редагувати</a>
                <form th:action="@{/delete/{id}(id=${reading.id})}"
                      method="post">
                    <button type="submit"
                            class="btn btn-danger btn-sm">
                        Видалити
                    </button>
                </form>
            </div>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
