name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, release/*]
  push:
    branches: [main, release/*]

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run static analysis (Checkstyle)
        shell: bash
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          mvn -B -DskipTests checkstyle:check | tee target/ci-logs/static-analysis.log

      - name: Upload static-analysis logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-logs
          path: target/ci-logs/**
          if-no-files-found: warn

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run unit tests
        shell: bash
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          mvn -B package -Dcheckstyle.skip=true | tee target/ci-logs/unit-tests.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: target/surefire-reports/**
          if-no-files-found: warn

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            target/site/jacoco/**
            target/jacoco.exec
          if-no-files-found: warn

      - name: Print coverage summary
        if: always()
        shell: bash
        run: |
          CSV_FILE="target/site/jacoco/jacoco.csv"
          if [ ! -f "$CSV_FILE" ]; then
            echo "Coverage report was not generated."
            echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "Coverage report was not generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          read -r COVERED MISSED < <(awk -F, 'NR>1 {covered+=$9; missed+=$8} END {print covered+0, missed+0}' "$CSV_FILE")
          TOTAL=$((COVERED + MISSED))
          if [ "$TOTAL" -eq 0 ]; then
            PERCENT="0.00"
          else
            PERCENT=$(awk -v c="$COVERED" -v t="$TOTAL" 'BEGIN {printf "%.2f", (c/t)*100}')
          fi
          echo "Coverage: ${PERCENT}% (covered: ${COVERED}, missed: ${MISSED})"
          {
            echo "## Coverage"
            echo "Line coverage: ${PERCENT}%"
            echo "Covered lines: ${COVERED}"
            echo "Missed lines: ${MISSED}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-logs
          path: target/ci-logs/**
          if-no-files-found: warn

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run integration tests
        shell: bash
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          mvn -B verify -DskipUTs=true -Dcheckstyle.skip=true -Dit.test=EnergyReadingFlowIntegrationTests | tee target/ci-logs/integration-tests.log

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: target/failsafe-reports/**
          if-no-files-found: warn

      - name: Upload integration coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-reports
          path: |
            target/site/jacoco-it/**
            target/jacoco-it.exec
          if-no-files-found: warn

      - name: Print integration coverage summary
        if: always()
        shell: bash
        run: |
          CSV_FILE="target/site/jacoco-it/jacoco.csv"
          if [ ! -f "$CSV_FILE" ]; then
            echo "Integration coverage report was not generated."
            {
              echo "## Integration Tests summary"
              echo "Integration coverage report was not generated."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Integration Tests summary"
            echo ""
            echo "Integration Test Coverage"
          } >> "$GITHUB_STEP_SUMMARY"
          while IFS=, read -r grp pkg cls i_miss i_cov b_miss b_cov l_miss l_cov c_miss c_cov m_miss m_cov; do
            if [ "$cls" = "EnergyReading" ] || [ "$cls" = "EnergyReadingController" ]; then
              total=$((l_cov + l_miss))
              if [ "$total" -gt 0 ]; then
                percent=$(awk -v c="$l_cov" -v t="$total" 'BEGIN {printf "%.2f", (c/t)*100}')
              else
                percent="0.00"
              fi
              {
                echo ""
                echo "org.energy.${cls}"
                echo "Line coverage: ${percent}%"
                echo "Covered lines: ${l_cov}"
                echo "Missed lines: ${l_miss}"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          done < <(tail -n +2 "$CSV_FILE")

      - name: Upload integration test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: target/ci-logs/**
          if-no-files-found: warn

  e2e-tests:
    name: E2E UI Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile test sources
        shell: bash
        run: mvn -B test-compile -Dcheckstyle.skip=true

      - name: Install Playwright Chromium
        shell: bash
        run: >
          mvn exec:java -e
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps chromium"
          -Dexec.classpathScope=test

      - name: Run E2E tests
        shell: bash
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          mvn -B verify -DskipUTs=true -Dcheckstyle.skip=true -Dit.test=EnergyReadingHappyPathE2ETests | tee target/ci-logs/e2e-tests.log

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: target/failsafe-reports/**
          if-no-files-found: warn

      - name: Upload E2E test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: target/ci-logs/**
          if-no-files-found: warn

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build project
        shell: bash
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          mvn -B package -DskipTests -Djacoco.skip=true -Dcheckstyle.skip=true | tee target/ci-logs/build.log

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar
          if-no-files-found: warn

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: target/ci-logs/**
          if-no-files-found: warn

  publish:
    name: Publish Package
    needs: build
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/maven-publish.yml
    secrets: inherit

  # Етап 6: опублікувати Docker-образ лише після успішного завершення етапу збірки
  publish-docker:
    name: Publish Docker Image
    needs: build
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
